[workspace]
name = "process-sequence-model"
version = "0.1.0"
description = "Semiconductor process sequence prediction with RF + Transformer"
channels = ["conda-forge"]
platforms = ["linux-64"]

[system-requirements]
cuda = "12"

[dependencies]
python = "3.12.*"
libstdcxx-ng = ">=13"

[pypi-dependencies]
torch = "==2.3.1"
numpy = ">=1.26,<2.1"
scikit-learn = ">=1.4"
matplotlib = ">=3.8"
