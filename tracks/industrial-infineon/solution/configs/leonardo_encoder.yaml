run_name: leo_encoder_base
seed: 42
precision: bf16
artifacts: artifacts
decoder_ckpt: artifacts/decoder_base
encoder_ckpt: artifacts/encoder_base
decoder:
  size: base
  max_len: 256
  data_per_family: 5000
  batch_size: 64
  lr: 0.0006
  max_steps: 4000
  eval_every: 250
encoder:
  size: base
  max_len: 256
  data_per_family: 5000
  batch_size: 64
  lr: 0.0002
  max_steps: 4000
  warmup_frac: 0.1
  weight_decay: 0.01
  eval_every: 250
  contrastive:
    enabled: true
    weight: 0.5
    temperature: 0.1
