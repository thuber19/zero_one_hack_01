[workspace]
name = "process-sequence-model"
version = "0.1.0"
description = "Semiconductor process sequence prediction with RF + Transformer"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.13"
numpy = ">=1.26"
scikit-learn = ">=1.4"
matplotlib = ">=3.8"
pip = "*"

[pypi-dependencies]
torch = {version = ">=2.2", index = "https://download.pytorch.org/whl/cu121"}
