seed: 42

data:
  csv_paths:
    IC: tracks/industrial-infineon/training_data/IC_variants.csv
    IGBT: tracks/industrial-infineon/training_data/IGBT_variants.csv
    MOSFET: tracks/industrial-infineon/training_data/MOSFET_variants.csv
  work_subdir: data/fab_sequences
  split_ratio: [0.8, 0.1, 0.1]
  max_len: 256
  pack: true

model:
  d_model: 512
  n_layers: 12
  n_heads: 8
  d_ff: 2048
  max_len: 256
  dropout: 0.1
  tie_embeddings: true

optim:
  lr: 3.0e-4
  lr_min: 3.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.1
  eps: 1.0e-8
  grad_clip: 1.0
  warmup_frac: 0.05

train:
  per_device_batch: 128
  grad_accum: 1
  epochs: 20
  early_stop_patience: 3
  val_every_epochs: 1
  ckpt_every_epochs: 2
  precision: bfloat16
  soft_walltime_hours: 6.0
  log_every_steps: 20

eval:
  top_k: [1, 5]
  memorization_n: 100
  generation_n_per_variant: 50
  generation_temperature: 0.8
