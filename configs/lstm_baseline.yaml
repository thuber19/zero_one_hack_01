seed: 42

model:
  embed_dim: 128
  hidden_size: 512
  num_layers: 2
  dropout: 0.1

optim:
  lr: 1.0e-3
  lr_min: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.01
  eps: 1.0e-8
  grad_clip: 1.0
  warmup_frac: 0.05

train:
  per_device_batch: 128
  epochs: 20
  early_stop_patience: 3
  val_every_epochs: 1
  ckpt_every_epochs: 2
  keep_recent_ckpts: 3
  log_every_steps: 20
  soft_walltime_hours: 2.0
  # fp32 or bfloat16
  precision: fp32

eval:
  top_k: [1, 5]
  memorization_n: 100
